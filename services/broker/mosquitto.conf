# Config de Eclipse Mosquitto para el broker MQTT compartido del proyecto.
# Decisiones de origen: ADR-09 (MQTT v5.0, QoS 1, sesiones persistentes, LWT por
# productor) y ADR-14 (Zero Trust local — este broker NO se expone a Internet,
# solo a la red Docker/LAN; el único puerto expuesto externamente es el de Grafana).

listener 1883
protocol mqtt

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice

# Sin autenticación por ahora: el broker no sale de la red local/Docker (ADR-14).
# Si en semana 15-16 (postura Zero Trust) se decide sumar auth interna, se agrega
# password_file acá sin tocar el resto de la pila.
allow_anonymous true
